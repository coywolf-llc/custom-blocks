name: Release on PR merge

# After a PR merges to main:
# 1. If the PR did not change the plugin version itself, bump the patch
#    version (header + readme.md fact list + readme.txt "Stable tag") and
#    prepend a changelog entry crediting the PR; push that bump back to main.
# 2. Build a slim plugin zip (npm-built JS/CSS only, no vendor/, no js/src,
#    no dev configs) and publish it as a GitHub Release tagged "vX.Y.Z".
#    The release zip is what the in-plugin updater downloads.

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Decide whether to bump or release at the current version
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Read the version currently committed on main from the plugin
          # header. That is the source of truth for "what version are we
          # trying to ship?".
          CURR=$(grep -oE "^[[:space:]]*\*[[:space:]]*Version:[[:space:]]*[0-9]+\.[0-9]+\.[0-9]+" \
            coywolf-custom-blocks.php \
            | grep -oE "[0-9]+\.[0-9]+\.[0-9]+" \
            | head -n 1)
          if [ -z "$CURR" ]; then
            echo "::error::Could not parse Version: header from coywolf-custom-blocks.php"
            exit 1
          fi
          echo "curr=$CURR" >> "$GITHUB_OUTPUT"

          # If a release for the current version already exists, the PR
          # didn't include its own version bump — auto-bump the patch.
          # Otherwise the PR set the version explicitly; release at it.
          if gh release view "v$CURR" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release v$CURR already exists; will auto-bump the patch."
            echo "needs_bump=true" >> "$GITHUB_OUTPUT"
          else
            echo "No release for v$CURR yet; releasing at the current version."
            echo "needs_bump=false" >> "$GITHUB_OUTPUT"
            echo "release_version=$CURR" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next patch version
        if: steps.check.outputs.needs_bump == 'true'
        id: ver
        env:
          CURR: ${{ steps.check.outputs.curr }}
        run: |
          set -euo pipefail
          IFS='.' read -r MAJ MIN PAT <<< "$CURR"
          NEW="$MAJ.$MIN.$((PAT + 1))"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURR -> $NEW"

      - name: Apply bump to files
        if: steps.check.outputs.needs_bump == 'true'
        env:
          CURR: ${{ steps.check.outputs.curr }}
          NEW:  ${{ steps.ver.outputs.new }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # Plugin header (single-line " * Version: X.Y.Z").
          sed -i -E "s|(\*[[:space:]]+Version:[[:space:]]+)${CURR//./\\.}\b|\1${NEW}|" coywolf-custom-blocks.php
          # readme.md fact list ("- **Version:** X.Y.Z").
          if [ -f readme.md ]; then
            sed -i -E "s|(\*\*Version:\*\*[[:space:]]+)${CURR//./\\.}\b|\1${NEW}|" readme.md
          fi
          # readme.txt WP-format ("Stable tag: X.Y.Z").
          sed -i -E "s|(Stable tag:[[:space:]]+)${CURR//./\\.}\b|\1${NEW}|" readme.txt

          # Prepend a changelog entry to both readmes.
          python3 - <<'PY'
          import os, re
          new = os.environ["NEW"]
          title = os.environ["PR_TITLE"].replace("\r", " ").strip() or "Maintenance update"
          num = os.environ["PR_NUMBER"]

          targets = [
              {
                  "path": "readme.txt",
                  "anchor": r"(== Changelog ==\n)",
                  "entry":  f"\n= {new} =\n* {title} (#{num}).\n",
                  "required": True,
              },
              {
                  "path": "readme.md",
                  "anchor": r"(## Changelog\n)",
                  "entry":  f"\n### {new}\n- {title} (#{num}).\n",
                  "required": False,
              },
          ]
          for t in targets:
              if not os.path.exists(t["path"]):
                  if t["required"]:
                      raise SystemExit(f"Missing required file: {t['path']}")
                  continue
              with open(t["path"], "r", encoding="utf-8") as f:
                  content = f.read()
              new_content, n = re.subn(t["anchor"], r"\1" + t["entry"], content, count=1)
              if n == 0:
                  raise SystemExit(f"Could not find changelog anchor in {t['path']}")
              with open(t["path"], "w", encoding="utf-8") as f:
                  f.write(new_content)
          PY

      - name: Commit and push bump
        if: steps.check.outputs.needs_bump == 'true'
        id: commit
        env:
          NEW: ${{ steps.ver.outputs.new }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coywolf-custom-blocks.php readme.txt
          [ -f readme.md ] && git add readme.md || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(release): bump version to ${NEW} [skip ci]"
            git push origin main
          fi
          echo "release_version=${NEW}" >> "$GITHUB_OUTPUT"

      - name: Resolve final release version
        id: final
        run: |
          set -euo pipefail
          if [ "${{ steps.check.outputs.needs_bump }}" = "true" ]; then
            V="${{ steps.commit.outputs.release_version }}"
          else
            V="${{ steps.check.outputs.release_version }}"
          fi
          echo "version=${V}" >> "$GITHUB_OUTPUT"
          echo "tag=v${V}" >> "$GITHUB_OUTPUT"

      - name: Skip if tag already exists
        id: tagcheck
        env:
          TAG: ${{ steps.final.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; skipping release."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.tagcheck.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        if: steps.tagcheck.outputs.exists == 'false'
        run: npm ci --no-audit --no-fund --ignore-scripts

      - name: Build JS and CSS
        if: steps.tagcheck.outputs.exists == 'false'
        run: npm run build

      - name: Build plugin zip
        if: steps.tagcheck.outputs.exists == 'false'
        env:
          SLUG: coywolf-custom-blocks
        run: |
          set -euo pipefail
          BUILD_DIR="$RUNNER_TEMP/build"
          STAGE="$BUILD_DIR/$SLUG"
          rm -rf "$BUILD_DIR"
          mkdir -p "$STAGE"

          # Copy plugin runtime files only. The exclude list mirrors
          # `.distignore` but is spelled out so the workflow does not
          # depend on wp-cli being available.
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.githooks' \
            --exclude '.circleci' \
            --exclude '.gitignore' \
            --exclude '.distignore' \
            --exclude '.eslintrc' \
            --exclude '.stylelintrc.json' \
            --exclude '.nvmrc' \
            --exclude '.npmrc' \
            --exclude '.wp-env.json' \
            --exclude '.wordpress-org' \
            --exclude 'CONTRIBUTING.md' \
            --exclude 'composer.json' \
            --exclude 'composer.lock' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'phpcs.xml' \
            --exclude 'phpunit.xml' \
            --exclude 'tsconfig.json' \
            --exclude 'webpack.config.js' \
            --exclude 'babel.config.js' \
            --exclude 'postcss.config.js' \
            --exclude 'tailwind.config.js' \
            --exclude 'playwright.config.js' \
            --exclude 'node_modules' \
            --exclude 'vendor' \
            --exclude 'tests' \
            --exclude 'trunk' \
            --exclude 'build' \
            --exclude 'artifacts' \
            --exclude 'playwright-report' \
            --exclude 'test-results' \
            --exclude 'js/src' \
            --exclude 'css/src' \
            --exclude '*.zip' \
            ./ "$STAGE/"

          ( cd "$BUILD_DIR" && zip -r -q "$GITHUB_WORKSPACE/$SLUG.zip" "$SLUG" )
          ls -l "$SLUG.zip"

      - name: Extract release notes from readme.txt
        if: steps.tagcheck.outputs.exists == 'false'
        id: notes
        env:
          VERSION: ${{ steps.final.outputs.version }}
        run: |
          set -euo pipefail
          python3 - <<'PY' > release-notes.md
          import os, re
          version = os.environ["VERSION"]
          with open("readme.txt", "r", encoding="utf-8") as f:
              content = f.read()
          # Capture the body of "= <VERSION> =" up to the next "= x.y.z =" or end.
          pattern = r"=\s*" + re.escape(version) + r"\s*=\n(.*?)(?=\n=\s*\d|\Z)"
          m = re.search(pattern, content, re.DOTALL)
          if m:
              body = m.group(1).strip()
          else:
              body = "Release " + version + "."
          print(body)
          PY
          echo "---"
          cat release-notes.md

      - name: Create GitHub release
        if: steps.tagcheck.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG:      ${{ steps.final.outputs.tag }}
          VERSION:  ${{ steps.final.outputs.version }}
          SLUG:     coywolf-custom-blocks
        run: |
          set -euo pipefail
          # Target the latest commit on main (the bump commit, if we just made one).
          TARGET=$(git rev-parse HEAD)
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md \
            --target "$TARGET" \
            "${SLUG}.zip"
